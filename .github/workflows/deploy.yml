name: Deploy

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Build ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          API_URL: ${{ vars.API_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # ── Deploy frontend → GitHub Pages ─────────────────────
  deploy-frontend:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment

  # ── Deploy backend → Render ────────────────────────────
  # To enable:
  #   1. Create a Web Service on https://render.com
  #      - Build command: npm install
  #      - Start command: node server.js
  #   2. Copy the Deploy Hook URL from the Render dashboard
  #   3. Add it as a repository variable named RENDER_DEPLOY_HOOK_URL
  #      (Settings → Secrets and variables → Variables)
  deploy-backend:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ vars.RENDER_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: Trigger Render deploy
        run: curl -sf "${{ vars.RENDER_DEPLOY_HOOK_URL }}"
