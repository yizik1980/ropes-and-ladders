name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify server starts
        run: |
          node server.js &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:3000 > /dev/null && echo "Server OK"
          kill $SERVER_PID
